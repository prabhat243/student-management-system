<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Management Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            font-family:Arial,sans-serif;
        }

        .login-card{
            width:420px;
            padding:40px;
            border-radius:25px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            box-shadow:0 8px 30px rgba(0,0,0,.25);
        }

        .logo{
            font-size:60px;
        }

        h2{
            color:white;
            font-weight:bold;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .btn-login{
            background:#10b981;
            color:white;
            font-weight:bold;
            border:none;
            border-radius:12px;
            padding:12px;
        }

        .btn-login:hover{
            background:#059669;
        }

        .text-light-small{
            color:#eee;
            font-size:14px;
        }

    </style>

</head>
<body>

<div class="login-card">

    <div class="text-center mb-4">

        <div class="logo">🎓</div>

        <h2>Student Management</h2>

        <p class="text-light-small">
            Admin & Student Portal
        </p>

    </div>

    <form method="post" action="/login">

        <div class="mb-3">
            <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Username"
                    required>
        </div>

        <div class="mb-3">
            <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Password"
                    required>
        </div>

        <button class="btn btn-login w-100">
            Login
        </button>

    </form>

</div>

</body>
</html>
