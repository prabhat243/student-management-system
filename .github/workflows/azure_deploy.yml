name: Student portal azure deployement

on:
  push:
    branches:
      - main

env:
  WEBAPP_NAME: student-portal
  IMAGE_NAME: studentmanagement
  ACR_NAME: prabhatstudentacr


jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
          - name: Checkout code
            uses: actions/checkout@v3

          - name: Set up JDK 25
            uses: actions/setup-java@v3
            with:
              distribution: temurin
              java-version: '25'
              cache: maven

          - name: Build Maven Project
            run: ./mvnw clean package -DskipTests

          - name: login to azure 
            uses: azure/Login@v2
            with:
              creds: ${{ secrets.AZURE_CREDENTIALS }}
          
          - name: Go to Azure Container Registry
            run: az acr login --name $ACR_NAME

          - name: Build and Push Docker Image
            run: | 
              docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
              docker tag $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} $ACR_NAME.azurecr.io/$IMAGE_NAME:latest
              docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
              docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

          - name: Azure App Deployment 
            uses: azure/webapps-deploy@v2
            with:
                app-name: ${{ WEBAPP_NAME }}
                images: ${{ ACR_NAME }}.azurecr.io/${{ IMAGE_NAME }}:${{ github.sha }}